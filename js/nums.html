<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <pre><script>
let n = 5;
for(let i = 1; i <= n; i++) {

        for(let j = 1; j <= n-i; j++) {
            document.write("  ");
        }

        let num = i;

        // print numbers
        for(let k = 1; k <= i; k++) {
            document.write(num + " ");
            num++;
        }

        document.write("\n");
    }
</script></pre>
</body>
</html>
