<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <pre><script>
        let n = 5;
         for(let i = 1; i <= n; i++) {

        for(let j = 1; j <= n - i; j++) {
            document.write(" ");
        }

        for(let j = i; j < 2*i; j++) {
            document.write(j);
        }

        for(let j = 2*i - 2; j >= i; j--) {
            document.write(j);
        }

        document.write("\n");
    }
    </script></pre>
</body>
</html>
